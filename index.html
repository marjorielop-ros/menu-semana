<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#34614a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Menú Semanal</title>
<style>
  :root{
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
    --sans:'Hanken Grotesk',system-ui,-apple-system,sans-serif;
    --bg:#f4efe3; --surface:#fffdf8; --ink:#2c2a23; --muted:#8c8472;
    --green:#34614a; --green-d:#264837; --green-soft:#e6efe7;
    --accent:#c2683c; --accent-soft:#f6e2d3; --line:#ece4d4; --rojo:#b3261e;
    --shadow:0 2px 8px rgba(60,48,24,.07),0 1px 2px rgba(60,48,24,.05);
    --shadow-lg:0 10px 34px rgba(45,36,16,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;font-family:var(--sans);color:var(--ink);padding-bottom:80px;
    background:
      radial-gradient(900px 380px at 100% -8%,rgba(52,97,74,.07),transparent 60%),
      radial-gradient(700px 320px at -10% 4%,rgba(194,104,60,.06),transparent 55%),
      var(--bg);
    background-attachment:fixed;
  }
  h1,h2,h3{font-family:var(--serif);font-weight:550;}

  /* Cabecera */
  header{
    position:sticky;top:0;z-index:10;color:#fdf6e9;
    background:linear-gradient(165deg,#3a6c52 0%,#2c5440 60%,#264a37 100%);
    padding:env(safe-area-inset-top) 0 0;
    box-shadow:0 6px 20px rgba(30,52,40,.22);
    border-bottom:1px solid rgba(255,255,255,.06);
  }
  .brand{
    font-family:var(--serif);font-weight:600;font-size:1.5rem;letter-spacing:.01em;
    padding:14px 18px 10px;display:flex;align-items:center;gap:9px;
  }
  .brand::before{content:"🍃";font-size:1.05rem;filter:saturate(.85);}
  .days{display:flex;gap:7px;overflow-x:auto;padding:0 14px 13px;scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .day{
    flex:0 0 auto;min-width:52px;padding:7px 8px;border:none;border-radius:13px;
    background:rgba(255,255,255,.12);color:#f0ead9;font-family:var(--sans);
    font-size:.82rem;font-weight:700;cursor:pointer;text-align:center;line-height:1.15;
    transition:transform .15s,background .15s;
  }
  .day:active{transform:scale(.94);}
  .day small{display:block;font-size:.62rem;font-weight:500;opacity:.8;margin-top:3px;letter-spacing:.02em;}
  .day.activo{background:#fdf6e9;color:var(--green);box-shadow:0 4px 12px rgba(20,40,30,.28);}
  .day.activo small{opacity:.7;}

  /* Aviso alérgenos */
  .note{
    background:linear-gradient(#fff7e6,#fdf1d8);border-bottom:1px solid #ecd9a6;color:#7a5d1c;
    font-size:.78rem;padding:9px 18px;cursor:pointer;
  }
  .note strong{color:#6a4f12;}
  .note .full{display:none;} .note.abierto .full{display:inline;} .note.abierto .corto{display:none;}

  main{padding:16px 14px;max-width:620px;margin:0 auto;}
  .oculto{display:none!important;}

  /* Tarjetas de franja */
  .slot{
    background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:13px 14px 14px;margin-bottom:14px;box-shadow:var(--shadow);
    animation:rise .45s cubic-bezier(.2,.7,.3,1) both;
  }
  .slot:nth-child(1){animation-delay:.02s}.slot:nth-child(2){animation-delay:.06s}
  .slot:nth-child(3){animation-delay:.10s}.slot:nth-child(4){animation-delay:.14s}
  .slot:nth-child(5){animation-delay:.18s}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .slot-title{
    font-family:var(--serif);font-weight:600;font-size:1.08rem;color:var(--green);
    margin-bottom:9px;display:flex;align-items:center;gap:8px;
  }
  .slot-title::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);flex:0 0 auto;}
  .platos{display:flex;flex-direction:column;gap:7px;margin-bottom:9px;}
  .plato{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:var(--green-soft);border:1px solid #d3e2d6;border-radius:11px;
    padding:9px 11px;font-size:.9rem;color:#234;
  }
  .plato.txt{background:#f3efe5;border-color:var(--line);font-style:italic;color:var(--muted);}
  .plato .x{border:none;background:none;color:var(--rojo);font-size:1.2rem;line-height:1;cursor:pointer;padding:0 2px;opacity:.7;}
  .plato .x:active{opacity:1;}
  .add{
    border:1.5px dashed #b9cdbf;background:transparent;color:var(--green);
    border-radius:11px;padding:10px;width:100%;font-size:.86rem;font-weight:600;cursor:pointer;
    font-family:var(--sans);transition:background .15s;
  }
  .add:active{background:var(--green-soft);}

  /* Nav inferior */
  nav{
    position:fixed;bottom:0;left:0;right:0;display:flex;z-index:15;
    background:rgba(255,253,248,.92);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);
    box-shadow:0 -4px 20px rgba(50,40,20,.06);
  }
  nav button{
    flex:1;border:none;background:none;padding:9px 0 11px;font-size:.74rem;font-weight:600;
    color:var(--muted);cursor:pointer;font-family:var(--sans);position:relative;transition:color .15s;
  }
  nav button .ic{display:block;font-size:1.25rem;line-height:1.35;filter:grayscale(.4);opacity:.7;}
  nav button.activo{color:var(--green);}
  nav button.activo .ic{filter:none;opacity:1;}
  nav button.activo::after{
    content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:30px;height:3px;border-radius:0 0 4px 4px;background:var(--accent);
  }

  /* Selector de platos (sheet) */
  .sheet-bg{position:fixed;inset:0;background:rgba(35,28,12,.42);z-index:20;display:none;animation:fade .2s;}
  .sheet-bg.abierto{display:block;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;max-height:84vh;background:var(--surface);
    border-radius:22px 22px 0 0;z-index:21;display:none;flex-direction:column;
    box-shadow:var(--shadow-lg);
  }
  .sheet.abierto{display:flex;animation:slideup .28s cubic-bezier(.2,.8,.2,1);}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .sheet::before{content:"";width:42px;height:5px;border-radius:3px;background:var(--line);margin:10px auto 2px;}
  .sheet h3{margin:0;padding:8px 18px 10px;font-size:1.15rem;color:var(--green);}
  .sheet .buscar{
    margin:0 18px 10px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;
    font-size:16px;width:calc(100% - 36px);font-family:var(--sans);background:#fbf7ef;
  }
  .sheet .buscar:focus{outline:2px solid var(--green-soft);border-color:var(--green);}
  .sheet .lista{overflow-y:auto;padding:0 18px 8px;}
  .grupo-tit{
    font-family:var(--serif);font-size:.82rem;font-weight:600;color:var(--accent);
    margin:14px 0 6px;letter-spacing:.01em;
  }
  .opcion{
    display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;
    border:1px solid var(--line);background:#fff;border-radius:11px;padding:11px 13px;margin-bottom:6px;
    font-size:.9rem;cursor:pointer;font-family:var(--sans);color:var(--ink);transition:transform .12s,border-color .12s;
  }
  .opcion:active{transform:scale(.98);border-color:var(--green);}
  .opcion .badge{font-size:.68rem;color:#fff;background:var(--accent);border-radius:20px;padding:2px 8px;font-weight:600;}
  .sheet .cerrar{
    margin:8px 18px 16px;padding:13px;border:none;background:var(--green);color:#fdf6e9;
    border-radius:13px;font-size:.92rem;font-weight:600;cursor:pointer;font-family:var(--sans);
  }
  .libre{display:flex;gap:7px;margin:8px 18px 0;}
  .libre input{flex:1;padding:11px;border:1px solid var(--line);border-radius:11px;font-size:16px;font-family:var(--sans);background:#fbf7ef;}
  .libre button{border:1px solid #d3e2d6;background:var(--green-soft);color:var(--green);border-radius:11px;padding:0 16px;cursor:pointer;font-weight:600;font-family:var(--sans);}

  /* Compra */
  .toggle-compra{
    display:flex;gap:4px;margin-bottom:14px;background:#eae2d2;border-radius:13px;padding:4px;
  }
  .toggle-compra button{
    flex:1;padding:10px;border:none;background:transparent;color:var(--muted);
    border-radius:10px;font-size:.84rem;font-weight:700;cursor:pointer;font-family:var(--sans);transition:.15s;
  }
  .toggle-compra button.activo{background:var(--surface);color:var(--green);box-shadow:var(--shadow);}
  .seccion{
    background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:12px 15px;margin-bottom:14px;box-shadow:var(--shadow);
  }
  .seccion h2{
    font-size:1.05rem;color:var(--green);margin:0 0 6px;display:flex;align-items:center;gap:7px;
  }
  .seccion h2::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);}
  .fila{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f1ebdd;}
  .fila:last-child{border-bottom:none;}
  .fila input[type=checkbox]{width:21px;height:21px;flex:0 0 auto;accent-color:var(--green);border-radius:6px;}
  .fila .nom{flex:1;font-size:.92rem;}
  .fila .cnt{font-size:.7rem;color:var(--accent);background:var(--accent-soft);border-radius:20px;padding:2px 9px;font-weight:600;white-space:nowrap;}
  .fila .qty{
    width:86px;padding:7px 9px;border:1px solid var(--line);border-radius:9px;font-size:15px;
    font-family:var(--sans);background:#fbf7ef;text-align:center;
  }
  .fila .qty:focus{outline:2px solid var(--green-soft);border-color:var(--green);}

  /* Lista final: tachar tocando la palabra */
  .palabra{
    flex:1;font-size:.96rem;padding:7px 0 7px 32px;position:relative;cursor:pointer;user-select:none;
    transition:color .15s;
  }
  .palabra::before{
    content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);
    width:21px;height:21px;border-radius:50%;border:2px solid #c3d3c6;transition:.15s;
  }
  .palabra::after{
    content:"✓";position:absolute;left:5px;top:50%;transform:translateY(-50%);
    color:#fff;font-size:12px;font-weight:700;opacity:0;transition:.15s;
  }
  .fila.tachado .palabra{text-decoration:line-through;color:var(--muted);}
  .fila.tachado .palabra::before{background:var(--green);border-color:var(--green);}
  .fila.tachado .palabra::after{opacity:1;}

  .vacio{color:var(--muted);font-size:.9rem;text-align:center;padding:30px 16px;line-height:1.5;font-family:var(--sans);}
  .avisobbq{
    background:linear-gradient(#fff7e6,#fdf1d8);border:1px solid #ecd9a6;color:#7a5d1c;
    border-radius:13px;padding:10px 12px;font-size:.82rem;margin-bottom:14px;
  }
  .acc{
    padding:13px;border:none;background:var(--green);color:#fdf6e9;border-radius:13px;
    font-size:.9rem;font-weight:600;cursor:pointer;width:100%;margin-top:6px;font-family:var(--sans);
    box-shadow:var(--shadow);transition:transform .12s;
  }
  .acc:active{transform:scale(.99);}

  /* Aviso "Guardado" */
  .estado{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--green-d);background:var(--green);color:#fdf6e9;padding:9px 18px;border-radius:22px;
    font-size:.8rem;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:30;
    box-shadow:var(--shadow-lg);
  }
  .estado.visible{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Tabla de impresión del menú (oculta en pantalla) */
  #print-menu{display:none;}
  #print-menu table{border-collapse:collapse;width:100%;}
  #print-menu th,#print-menu td{border:1px solid #b9b2a0;padding:6px 8px;vertical-align:top;font-size:11px;font-family:var(--sans);}
  #print-menu th{background:#ece4d4;font-family:var(--serif);font-weight:600;}
  #print-menu td.franja{background:#f4efe3;font-weight:bold;white-space:nowrap;font-family:var(--serif);}
  #print-menu .pl{display:block;margin-bottom:2px;}
  #print-menu h1{font-size:18px;margin:0 0 12px;color:#264837;}

  @media print{
    @page{size:A4 landscape;margin:1cm;}
    body>*{display:none!important;}
    #print-menu{display:block!important;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">Menú Semanal</div>
  <div class="days" id="days"></div>
</header>

<div class="note" id="note" onclick="this.classList.toggle('abierto')">
  <strong>Sin gluten + sin lactosa.</strong>
  <span class="corto"> Toca para ver el aviso.</span>
  <span class="full"> Revisa etiquetas y usa versiones certificadas en procesados (contaminación cruzada). Lácteos sin lactosa.</span>
</div>

<main id="vista-menu"></main>
<main id="vista-compra" class="oculto"></main>

<nav>
  <button id="nav-menu" class="activo" onclick="irA('menu')"><span class="ic">🍽️</span>Menú</button>
  <button id="nav-compra" onclick="irA('compra')"><span class="ic">🛒</span>Compra</button>
</nav>

<!-- Selector de platos -->
<div class="sheet-bg" id="sheet-bg" onclick="cerrarSheet()"></div>
<div class="sheet" id="sheet">
  <h3 id="sheet-tit">Añadir plato</h3>
  <input class="buscar" id="buscar" placeholder="Buscar plato…" oninput="pintarOpciones()">
  <div class="lista" id="opciones"></div>
  <div class="libre">
    <input id="libre-input" placeholder="Otro (texto libre, sin ingredientes)">
    <button onclick="añadirLibre()">Añadir</button>
  </div>
  <button class="cerrar" onclick="cerrarSheet()">Listo</button>
</div>

<div class="estado" id="estado">Guardado ✓</div>

<!-- Tabla del menú para imprimir/exportar PDF (oculta en pantalla) -->
<div id="print-menu"></div>

<script>

  // Pescado
  {n:"Merluza al horno con verduras",g:"Pescado y marisco",ing:["merluza","patata","cebolla","pimiento","tomate"]},
  {n:"Pescado a la plancha con verduras",g:"Pescado y marisco",ing:["pescado blanco","calabacín","pimiento","cebolla"]},
  {n:"Atún con pimientos",g:"Pescado y marisco",ing:["atún","pimiento","cebolla","tomate"]},
  {n:"Revuelto de setas y gambas",g:"Pescado y marisco",ing:["huevo","setas","gambas","ajo"]},
  {n:"Sushi",g:"Pescado y marisco",hecho:true},
  // Verduras y sopas
  {n:"Ensalada mixta",g:"Verduras, sopas y tortilla",ing:["lechuga","tomate","cebolla","maíz","zanahoria","aceitunas"]},
  {n:"Ensalada de huevo, atún y pimientos",g:"Verduras, sopas y tortilla",ing:["huevo","atún","pimiento"]},
  {n:"Verduras a la plancha",g:"Verduras, sopas y tortilla",ing:["calabacín","berenjena","pimiento","cebolla","espárragos"]},
  {n:"Patata cocida",g:"Verduras, sopas y tortilla",ing:["patata"]},
  {n:"Crema de calabacín",g:"Verduras, sopas y tortilla",ing:["calabacín","cebolla","patata","caldo de verduras"]},
  {n:"Purrusalda",g:"Verduras, sopas y tortilla",ing:["puerro","patata","zanahoria"]},
  {n:"Gazpacho",g:"Verduras, sopas y tortilla",ing:["tomate","pepino","pimiento","cebolla","ajo","pan"]},
  {n:"Salmorejo",g:"Verduras, sopas y tortilla",ing:["tomate","pan","ajo","huevo","jamón"]},
  {n:"Sopa de pollo con arroz",g:"Verduras, sopas y tortilla",ing:["pollo","arroz","zanahoria","puerro","apio","cebolla"]},
  {n:"Tortilla de patata",g:"Verduras, sopas y tortilla",ing:["huevo","patata","cebolla"]},
  {n:"Judías verdes con patatas",g:"Verduras, sopas y tortilla",ing:["judía verde","patata","ajo"]},
  {n:"Guisantes con jamón",g:"Verduras, sopas y tortilla",ing:["guisantes","jamón serrano","cebolla"]},
  {n:"Chupe de pollo",g:"Verduras, sopas y tortilla",ing:["pollo","patata","maíz","queso","cebolla","leche"]},
  {n:"Cachapa",g:"Verduras, sopas y tortilla",ing:["maíz dulce","queso","leche"]}
];

const BEBIDAS=["Vino","Cerveza","Cerveza sin gluten","Cava","Tónica","Agua con gas","Leche sin lactosa","Té de manzanilla","Té negro","Té verde","Café"];
const OTROS_COCINA=["Sal integral","Papelón","Limón","Aceite de oliva","Pimienta","Comino","Cúrcuma","Jengibre","Hierbas provenzales","Orégano"];
const OTROS_CASA=["Papel higiénico","Servilletas","Detergente ropa","Jabón cuerpo","Champú","Lavavajillas","Pasta de dientes"];

/* ---------- IDs e índice ---------- */
function slug(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}
CATALOGO.forEach(it=>{it.id=slug(it.n); if(it.hecho&&!it.ing)it.ing=[it.n];});
const byId={}; CATALOGO.forEach(it=>byId[it.id]=it);
const grupos=[...new Set(CATALOGO.map(it=>it.g))];

/* ---------- Estado ---------- */
const K_MENU="menuB_menu_v1", K_COMPRA="menuB_compra_v1";
let menu={}, compra={qty:{},done:{},incluir:{}};
try{menu=JSON.parse(localStorage.getItem(K_MENU)||"{}");}catch(e){menu={};}
try{compra=Object.assign({qty:{},done:{},incluir:{}},JSON.parse(localStorage.getItem(K_COMPRA)||"{}"));}catch(e){}

let diaActivo=(new Date().getDay()+6)%7;
let pendiente=null;          // {dia,franja} al que se añaden platos
let modoCompra="preparar";   // "preparar" | "final"

// Fechas de la semana actual (anclada al lunes)
function lunesSemana(){const h=new Date();const off=(h.getDay()+6)%7;const m=new Date(h);m.setDate(h.getDate()-off);m.setHours(0,0,0,0);return m;}
function fechaDe(i){const d=lunesSemana();d.setDate(d.getDate()+i);return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");}

let tEstado;
function avisar(){const e=document.getElementById("estado");e.classList.add("visible");clearTimeout(tEstado);tEstado=setTimeout(()=>e.classList.remove("visible"),1000);}
function guardarMenu(){try{localStorage.setItem(K_MENU,JSON.stringify(menu));avisar();}catch(e){}}
function guardarCompra(){try{localStorage.setItem(K_COMPRA,JSON.stringify(compra));avisar();}catch(e){}}

/* ---------- Navegación ---------- */
function irA(v){
  document.getElementById("vista-menu").classList.toggle("oculto",v!=="menu");
  document.getElementById("vista-compra").classList.toggle("oculto",v!=="compra");
  document.getElementById("nav-menu").classList.toggle("activo",v==="menu");
  document.getElementById("nav-compra").classList.toggle("activo",v==="compra");
  if(v==="compra")pintarCompra();
}

/* ---------- MENÚ ---------- */
const cont=document.getElementById("days");
function pintarDias(){
  cont.innerHTML=dias.map((d,i)=>`<button class="day ${i===diaActivo?"activo":""}" data-i="${i}">${diasCorto[i]}<small>${fechaDe(i)}</small></button>`).join("");
}
cont.addEventListener("click",e=>{const b=e.target.closest(".day");if(!b)return;diaActivo=+b.dataset.i;pintarDias();pintarMenu();});

const vistaMenu=document.getElementById("vista-menu");
function entradasDe(dia,franja){return (menu[dia]&&menu[dia][franja])||[];}
function pintarMenu(){
  const dia=dias[diaActivo];
  vistaMenu.innerHTML=franjas.map(f=>{
    const ent=entradasDe(dia,f);
    const filas=ent.map((e,idx)=>{
      if(e.startsWith("txt:")) return `<div class="plato txt"><span>${e.slice(4)}</span><button class="x" data-f="${f}" data-idx="${idx}">×</button></div>`;
      const it=byId[e]; const nom=it?it.n:e;
      return `<div class="plato"><span>${nom}</span><button class="x" data-f="${f}" data-idx="${idx}">×</button></div>`;
    }).join("");
    return `<section class="slot">
      <div class="slot-title">${f}</div>
      <div class="platos">${filas}</div>
      <button class="add" data-f="${f}">+ añadir plato</button>
    </section>`;
  }).join("") + `<button class="acc" id="exportar">Exportar menú semanal (PDF)</button>`;
}

// Construye la tabla de los 7 días y lanza la exportación/impresión
function exportarMenu(){
  const txt=e=>e.startsWith("txt:")?e.slice(4):(byId[e]?byId[e].n:e);
  const filas=franjas.map(f=>{
    const celdas=dias.map(d=>{
      const ent=entradasDe(d,f).map(e=>`<span class="pl">${txt(e)}</span>`).join("");
      return `<td>${ent}</td>`;
    }).join("");
    return `<tr><td class="franja">${f}</td>${celdas}</tr>`;
  }).join("");
  document.getElementById("print-menu").innerHTML=
    `<h1>Menú Semanal</h1>
     <table><tr><th></th>${dias.map((d,i)=>`<th>${d} ${fechaDe(i)}</th>`).join("")}</tr>${filas}</table>`;
  window.print();
}
vistaMenu.addEventListener("click",e=>{
  if(e.target.id==="exportar"){exportarMenu();return;}
  const add=e.target.closest(".add");
  if(add){abrirSheet(add.dataset.f);return;}
  const x=e.target.closest(".x");
  if(x){
    const dia=dias[diaActivo], f=x.dataset.f, idx=+x.dataset.idx;
    menu[dia][f].splice(idx,1); guardarMenu(); pintarMenu();
  }
});

/* ---------- Sheet selector ---------- */
function abrirSheet(franja){
  pendiente={dia:dias[diaActivo],franja};
  document.getElementById("sheet-tit").textContent="Añadir a "+franja+" · "+dias[diaActivo];
  document.getElementById("buscar").value="";
  document.getElementById("libre-input").value="";
  pintarOpciones();
  document.getElementById("sheet-bg").classList.add("abierto");
  document.getElementById("sheet").classList.add("abierto");
}
function cerrarSheet(){
  document.getElementById("sheet-bg").classList.remove("abierto");
  document.getElementById("sheet").classList.remove("abierto");
  pendiente=null;
}
function pintarOpciones(){
  const q=slug(document.getElementById("buscar").value);
  const cajon=document.getElementById("opciones");
  let html="";
  grupos.forEach(g=>{
    const items=CATALOGO.filter(it=>it.g===g && (!q || it.id.includes(q)));
    if(!items.length)return;
    html+=`<div class="grupo-tit">${g}</div>`;
    html+=items.map(it=>`<button class="opcion" data-id="${it.id}">${it.n} ${it.hecho?'<span class="badge">· hecho</span>':''}</button>`).join("");
  });
  cajon.innerHTML=html||`<div class="vacio">Sin resultados</div>`;
}
document.getElementById("opciones").addEventListener("click",e=>{
  const b=e.target.closest(".opcion"); if(!b||!pendiente)return;
  añadirEntrada(b.dataset.id);
});
function añadirEntrada(val){
  const {dia,franja}=pendiente;
  if(!menu[dia])menu[dia]={};
  if(!menu[dia][franja])menu[dia][franja]=[];
  menu[dia][franja].push(val);
  guardarMenu(); pintarMenu();
}
function añadirLibre(){
  const v=document.getElementById("libre-input").value.trim();
  if(!v||!pendiente)return;
  añadirEntrada("txt:"+v);
  document.getElementById("libre-input").value="";
}

/* ---------- COMPRA ---------- */
function agregar(){
  const ing=new Map(), prod=new Map(), bbq=new Set();
  dias.forEach(dia=>franjas.forEach(f=>{
    entradasDe(dia,f).forEach(e=>{
      if(e.startsWith("txt:"))return;
      const it=byId[e]; if(!it)return;
      if(it.hecho){const k=it.n.toLowerCase();const o=prod.get(k)||{name:it.n,count:0};o.count++;prod.set(k,o);}
      else if(!it.ing.length){bbq.add(it.n);}
      else it.ing.forEach(g=>{const k=g.toLowerCase();const o=ing.get(k)||{name:g,count:0};o.count++;ing.set(k,o);});
    });
  }));
  const byName=(a,b)=>a.name.localeCompare(b.name,"es");
  return {ing:[...ing.values()].sort(byName),prod:[...prod.values()].sort(byName),bbq:[...bbq]};
}

const vistaCompra=document.getElementById("vista-compra");
function filaPreparar(key,name,count,incluible){
  const qty=compra.qty[key]||"";
  const cnt=count?`<span class="cnt">en ${count} plato${count>1?"s":""}</span>`:"";
  const chk=incluible?`<input type="checkbox" data-inc="${key}" ${compra.incluir[key]?"checked":""}>`:"";
  return `<div class="fila">${chk}<span class="nom">${name}</span>${cnt}
    <input class="qty" placeholder="cant." data-qty="${key}" value="${qty}"></div>`;
}
function filaFinal(key,name){
  const qty=compra.qty[key]||"";
  const done=compra.done[key]?"tachado":"";
  const q=qty?`<span class="cnt">${qty}</span>`:"";
  return `<div class="fila ${done}"><span class="palabra" data-done="${key}">${name}</span>${q}</div>`;
}

function pintarCompra(){
  const {ing,prod,bbq}=agregar();
  const hayMenu=ing.length||prod.length||bbq.length;

  if(modoCompra==="preparar"){
    let h=`<div class="toggle-compra">
      <button class="activo" onclick="setModo('preparar')">1 · Preparar</button>
      <button onclick="setModo('final')">2 · Lista para comprar</button></div>`;
    if(!hayMenu){
      h+=`<div class="vacio">Aún no has elegido platos en el menú.<br>Ve a la pestaña <b>Menú</b> y añade algo.</div>`;
      vistaCompra.innerHTML=h; return;
    }
    if(bbq.length) h+=`<div class="avisobbq">⚠ <b>${bbq.join(", ")}</b>: sin ingredientes definidos. Añádelos a mano en Bebidas/Otros o dímelos para incluirlos.</div>`;
    if(ing.length) h+=`<div class="seccion"><h2>Ingredientes del menú</h2>${ing.map(o=>filaPreparar("ing:"+o.name.toLowerCase(),o.name,o.count,false)).join("")}</div>`;
    if(prod.length) h+=`<div class="seccion"><h2>Productos ya hechos</h2>${prod.map(o=>filaPreparar("prod:"+o.name.toLowerCase(),o.name,o.count,false)).join("")}</div>`;
    h+=`<div class="seccion"><h2>Bebidas</h2>${BEBIDAS.map(n=>filaPreparar("beb:"+n,n,0,true)).join("")}</div>`;
    h+=`<div class="seccion"><h2>Otros · cocina</h2>${OTROS_COCINA.map(n=>filaPreparar("coc:"+n,n,0,true)).join("")}</div>`;
    h+=`<div class="seccion"><h2>Otros · casa</h2>${OTROS_CASA.map(n=>filaPreparar("casa:"+n,n,0,true)).join("")}</div>`;
    vistaCompra.innerHTML=h;
  } else {
    const secFinal=(titulo,items)=>items.length?`<div class="seccion"><h2>${titulo}</h2>${items.map(o=>filaFinal(o.key,o.name)).join("")}</div>`:"";
    const ingF=ing.map(o=>({key:"ing:"+o.name.toLowerCase(),name:o.name}));
    const prodF=prod.map(o=>({key:"prod:"+o.name.toLowerCase(),name:o.name}));
    const bebF=BEBIDAS.filter(n=>compra.incluir["beb:"+n]).map(n=>({key:"beb:"+n,name:n}));
    const cocF=OTROS_COCINA.filter(n=>compra.incluir["coc:"+n]).map(n=>({key:"coc:"+n,name:n}));
    const casaF=OTROS_CASA.filter(n=>compra.incluir["casa:"+n]).map(n=>({key:"casa:"+n,name:n}));
    const vacio=!(ingF.length||prodF.length||bebF.length||cocF.length||casaF.length);
    let h=`<div class="toggle-compra">
      <button onclick="setModo('preparar')">1 · Preparar</button>
      <button class="activo" onclick="setModo('final')">2 · Lista para comprar</button></div>`;
    if(vacio){
      h+=`<div class="vacio">Nada que comprar todavía.<br>Elige platos y marca bebidas/otros en el paso 1.</div>`;
    } else {
      h+=`<div class="vacio" style="padding:4px 4px 12px">Toca una palabra para tacharla mientras compras.</div>`;
      h+=secFinal("Ingredientes",ingF)+secFinal("Productos",prodF)+secFinal("Bebidas",bebF)+secFinal("Otros · cocina",cocF)+secFinal("Otros · casa",casaF);
    }
    vistaCompra.innerHTML=h;
  }
}
function setModo(m){modoCompra=m;pintarCompra();}

vistaCompra.addEventListener("input",e=>{
  if(e.target.dataset.qty!==undefined){compra.qty[e.target.dataset.qty]=e.target.value;guardarCompra();}
});
vistaCompra.addEventListener("change",e=>{
  if(e.target.dataset.inc!==undefined){compra.incluir[e.target.dataset.inc]=e.target.checked;guardarCompra();}
});
vistaCompra.addEventListener("click",e=>{
  const p=e.target.closest(".palabra"); if(!p)return;
  const k=p.dataset.done;
  compra.done[k]=!compra.done[k];
  p.closest(".fila").classList.toggle("tachado",compra.done[k]);
  guardarCompra();
});

/* ---------- Init ---------- */
pintarDias(); pintarMenu();
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}
</script>
</body>
</html>
